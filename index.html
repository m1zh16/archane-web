<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archane Hub</title>
<link rel="stylesheet" href="style.css">

<style>



#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0a;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:9999;
transition:opacity .6s;
}

.loader{
width:60px;
height:60px;
border:6px solid #222;
border-top:6px solid #4da6ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* OFFLINE */

#offline{
display:none;
height:100vh;
align-items:center;
justify-content:center;
background:#0a0a0a;
color:white;
}

.errorbox{
background:#111;
padding:40px;
border-radius:10px;
text-align:center;
}

.erroricon{
font-size:60px;
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>



<div id="splash">
<div class="loader"></div>
<p id="loadingText">Checking servers...</p>
</div>



<div id="offline">
<div class="errorbox">
<div class="erroricon">⚠</div>
<h2>Servers Offline</h2>
<p>Please try again later.</p>
</div>
</div>


<div id="mainContent" style="display:none">

<header>
<div class="logo">ARCHANE</div>
<nav>
<a href="index.html">Home</a>
<a href="itemshop.html">Item Shop</a>
<a href="tweaks.html">TWEAKS</a>
<a href="comp.html">COMP</a>
</nav>
</header>

<section class="hero">
<h1>Welcome to <span>Archane</span></h1>
<p>Your one-stop Fortnite hub</p>
</section>

</div>

<script>

fetch("http://192.168.1.1:3000/status?key=127.53.789.0.0.3")
.then(res => res.json())
.then(data => {

if(data.backend === "online"){

document.getElementById("loadingText").innerText="Servers Online";

setTimeout(()=>{

const splash=document.getElementById("splash")
splash.style.opacity="0"

setTimeout(()=>{
splash.style.display="none"
document.getElementById("mainContent").style.display="block"
},600)

},1000)

}else{

showOffline()

}

})
.catch(()=>{

showOffline()

})

function showOffline(){

document.getElementById("splash").style.display="none"
document.getElementById("offline").style.display="flex"

}

</script>

</body>
</html>
